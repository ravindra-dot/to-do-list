<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoList</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>ToDo</h1>
        <nav>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">About</a></li>
                <li><a href="">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main id="main">
        <!-- ye div conatiner hai jis me inputs or button rahenge... -->
        <div class="container">
            <label for="taskInput">Task</label>
            <input type="text" name="text" id="taskInput" placeholder="Task likho...">
            <button id="addTask">Add Task</button>
        </div>
        <!-- ab is vake div me filtere button rahenge -->
        <div class="filter">
            <ul id="filter">
                <li id="all">All tasks</li>
                <li id="completed">Complete task</li>
                <li id="pending">Pending task</li>

            </ul>
        </div>
        <!-- is vale me task dikha denge  -->
        <div class="task-list">
            <ul id="taskList">
                <!-- Tasks yaha add honge -->

            </ul>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
